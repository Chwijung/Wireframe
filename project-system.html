<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>산출물</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html, body {
      overflow-x: hidden;
      height: 100%;
      scroll-behavior: smooth;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-red-100">
  <!-- 헤더 -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center space-x-4">
          <button onclick="goBackToMain()" class="text-orange-600 hover:text-orange-700">
            ← 메인으로
          </button>
          <h1 class="text-2xl font-bold text-orange-700">산출물 관리</h1>
        </div>
        <div class="flex items-center space-x-4">
          <span class="text-gray-600">AI-X 3기 (5개 팀)</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-6 space-y-8">
    <!-- 메인 헤더 -->
    <header class="text-center py-6">
      <h2 class="text-3xl font-bold text-gray-800 mb-2">산출물 관리</h2>
      <p class="text-lg text-gray-600">운영진·코치</p>
    </header>

    <!-- 팀별 제출 현황 관리 -->
    <section class="bg-white rounded-xl shadow-lg">
      <div class="flex justify-between items-center p-6 border-b border-gray-200">
        <h3 class="text-xl font-semibold">팀별 제출 현황 관리</h3>
        <div class="flex space-x-2">
          <button onclick="sendReminder()" class="bg-yellow-600 text-white px-4 py-2 rounded-lg hover:bg-yellow-700">일괄 리마인더</button>
          <button onclick="openModal('newProjectModal')" class="bg-orange-600 text-white px-4 py-2 rounded-lg hover:bg-orange-700">새 발표 등록</button>
        </div>
      </div>

      <!-- 팀 탭 네비게이션 -->
      <div class="border-b border-gray-200">
        <nav class="flex space-x-8 px-6">
          <button id="team-tab-1" class="py-4 px-1 border-b-2 border-orange-500 text-orange-600 font-semibold" onclick="switchTeamTab(1)">1팀 - AI 혁신팀</button>
          <button id="team-tab-2" class="py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700" onclick="switchTeamTab(2)">2팀 - 데이터 드림팀</button>
          <button id="team-tab-3" class="py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700" onclick="switchTeamTab(3)">3팀 - 클라우드 크리에이터</button>
          <button id="team-tab-4" class="py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700" onclick="switchTeamTab(4)">4팀 - 스마트 솔루션</button>
          <button id="team-tab-5" class="py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700" onclick="switchTeamTab(5)">5팀 - 퓨처 테크</button>
        </nav>
      </div>

      <!-- 팀별 콘텐츠 -->
      <div id="team-content-1" class="p-6">
        <!-- 1팀 콘텐츠 -->
      </div>
      <div id="team-content-2" class="p-6 hidden">
        <!-- 2팀 콘텐츠 -->
      </div>
      <div id="team-content-3" class="p-6 hidden">
        <!-- 3팀 콘텐츠 -->
      </div>
      <div id="team-content-4" class="p-6 hidden">
        <!-- 4팀 콘텐츠 -->
      </div>
      <div id="team-content-5" class="p-6 hidden">
        <!-- 5팀 콘텐츠 -->
      </div>
    </section>

  <script>
    function goBackToMain() {
      const currentCohort = localStorage.getItem('currentCohort') || 'ai-x-3rd';
      window.location.href = `main.html?cohort=${currentCohort}`;
    }

    // 팀별 제출 현황 데이터
    const TEAMS_DATA = {
      teams: [
        {
          id: 1,
          name: "AI 혁신팀",
          members: ["김수강", "박개발", "이코딩"],
          memberCount: 3
        },
        {
          id: 2,
          name: "데이터 드림팀",
          members: ["최분석", "정머신", "한러닝"],
          memberCount: 3
        },
        {
          id: 3,
          name: "클라우드 크리에이터",
          members: ["서클라우드", "김인프라", "박배포"],
          memberCount: 3
        },
        {
          id: 4,
          name: "스마트 솔루션",
          members: ["오스마트", "신솔루션", "강개발"],
          memberCount: 3
        },
        {
          id: 5,
          name: "퓨처 테크",
          members: ["류퓨처", "윤테크", "조미래"],
          memberCount: 3
        }
      ],
      tasks: [
        {
          id: 1,
          title: '멘토링 일지',
          type: 'log',
          status: 'pending',
          dueDate: '2025-08-31',
          sessions: [
            { date: '2025-07-15', status: 'completed' },
            { date: '2025-07-22', status: 'completed' },
            { date: '2025-07-29', status: 'completed' },
            { date: '2025-08-05', status: 'completed' },
            { date: '2025-08-12', status: 'completed' },
            { date: '2025-08-19', status: 'completed' },
            { date: '2025-08-26', status: 'completed' },
            { date: '2025-09-02', status: 'pending' },
            { date: '2025-09-09', status: 'upcoming' },
            { date: '2025-09-16', status: 'upcoming' }
          ]
        },
        {
          id: 2,
          title: '미니발표',
          type: 'presentation',
          status: 'completed',
          dueDate: '2025-07-22',
          files: [
            { name: 'PPT 발표자료', required: true },
            { name: '발표영상', required: true }
          ]
        },
        {
          id: 3,
          title: '기획발표',
          type: 'presentation',
          status: 'completed',
          dueDate: '2025-07-29',
          files: [
            { name: 'PPT 발표자료', required: true },
            { name: '발표영상', required: false }
          ]
        },
        {
          id: 4,
          title: '중간발표',
          type: 'presentation',
          status: 'pending',
          dueDate: '2025-08-15',
          files: [
            { name: 'PPT 발표자료', required: true },
            { name: '발표영상', required: false }
          ]
        },
        {
          id: 5,
          title: '최종발표',
          type: 'presentation',
          status: 'upcoming',
          dueDate: '2025-09-04',
          files: [
            { name: 'PPT 발표자료', required: true },
            { name: '최종보고서', required: true },
            { name: '포트폴리오', required: true },
            { name: '발표영상', required: true }
          ]
        }
      ]
    };

    // 팀별 제출 현황 생성 (첨부파일 포함)
    function generateTeamSubmissions() {
      const submissions = {};
      
      TEAMS_DATA.teams.forEach(team => {
        submissions[team.id] = {};
        
        TEAMS_DATA.tasks.forEach(task => {
          submissions[team.id][task.id] = {};
          
          if (task.type === 'log') {
            // 멘토링 일지의 경우 세션별 제출 현황
            task.sessions.forEach((session, sessionIndex) => {
              let submitted = false;
              let attachments = [];
              
              if (session.status === 'completed') {
                submitted = Math.random() > 0.1; // 90% 확률로 제출됨
                if (submitted) {
                  // 멘토링일지 1개 + 사진 1-4개
                  attachments.push({
                    name: `멘토링_${sessionIndex + 1}회차_일지.pdf`,
                    size: Math.floor(Math.random() * 1000) + 200 + 'KB',
                    uploadDate: session.date
                  });
                  
                  const photoCount = Math.floor(Math.random() * 4) + 1; // 1-4개 사진
                  for (let i = 0; i < photoCount; i++) {
                    attachments.push({
                      name: `멘토링_${sessionIndex + 1}회차_사진${i + 1}.jpg`,
                      size: Math.floor(Math.random() * 2000) + 500 + 'KB',
                      uploadDate: session.date
                    });
                  }
                }
              } else if (session.status === 'pending') {
                submitted = Math.random() > 0.5; // 50% 확률로 제출됨
                if (submitted) {
                  // 멘토링일지 1개 + 사진 1-2개
                  attachments.push({
                    name: `멘토링_${sessionIndex + 1}회차_일지.pdf`,
                    size: Math.floor(Math.random() * 1000) + 200 + 'KB',
                    uploadDate: new Date().toISOString().split('T')[0]
                  });
                  
                  const photoCount = Math.floor(Math.random() * 2) + 1; // 1-2개 사진
                  for (let i = 0; i < photoCount; i++) {
                    attachments.push({
                      name: `멘토링_${sessionIndex + 1}회차_사진${i + 1}.jpg`,
                      size: Math.floor(Math.random() * 2000) + 500 + 'KB',
                      uploadDate: new Date().toISOString().split('T')[0]
                    });
                  }
                }
              }
              
              submissions[team.id][task.id][sessionIndex] = {
                submitted: submitted,
                submittedDate: submitted ? session.date : null,
                attachments: attachments
              };
            });
          } else {
            // 발표 과제의 경우 파일별 제출 현황
            task.files.forEach((file, fileIndex) => {
              let submitted = false;
              let attachments = [];
              
              if (task.status === 'completed') {
                submitted = Math.random() > 0.05; // 95% 확률로 제출됨
              } else if (task.status === 'pending') {
                submitted = Math.random() > 0.4; // 60% 확률로 제출됨
              }
              
              if (submitted) {
                // 파일 타입에 따른 첨부파일 생성
                if (file.name.includes('PPT')) {
                  attachments.push({
                    name: `${team.name}_${task.title}_발표자료.pdf`,
                    size: Math.floor(Math.random() * 5000) + 2000 + 'KB',
                    uploadDate: new Date().toISOString().split('T')[0]
                  });
                } else if (file.name.includes('영상')) {
                  attachments.push({
                    name: `${team.name}_${task.title}_시연영상.mp4`,
                    size: Math.floor(Math.random() * 50000) + 10000 + 'KB',
                    uploadDate: new Date().toISOString().split('T')[0]
                  });
                } else {
                  attachments.push({
                    name: `${team.name}_${file.name}.pdf`,
                    size: Math.floor(Math.random() * 3000) + 1000 + 'KB',
                    uploadDate: new Date().toISOString().split('T')[0]
                  });
                }
              }
              
              submissions[team.id][task.id][fileIndex] = {
                submitted: submitted,
                submittedDate: submitted ? new Date().toISOString().split('T')[0] : null,
                attachments: attachments
              };
            });
          }
        });
      });
      
      return submissions;
    }

    const teamSubmissions = generateTeamSubmissions();

    // 페이지 초기화
    document.addEventListener('DOMContentLoaded', function() {
      renderAllTeamTabs();
      initCharts();
    });

    // 팀 탭 전환
    function switchTeamTab(teamId) {
      // 모든 탭 비활성화
      for (let i = 1; i <= 5; i++) {
        document.getElementById(`team-tab-${i}`).className = 'py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700';
        document.getElementById(`team-content-${i}`).classList.add('hidden');
      }
      
      // 선택된 탭 활성화
      document.getElementById(`team-tab-${teamId}`).className = 'py-4 px-1 border-b-2 border-orange-500 text-orange-600 font-semibold';
      document.getElementById(`team-content-${teamId}`).classList.remove('hidden');
    }

    // 모든 팀 탭 콘텐츠 렌더링
    function renderAllTeamTabs() {
      TEAMS_DATA.teams.forEach(team => {
        renderTeamContent(team.id);
      });
    }

    // 개별 팀 콘텐츠 렌더링
    function renderTeamContent(teamId) {
      const team = TEAMS_DATA.teams.find(t => t.id === teamId);
      const container = document.getElementById(`team-content-${teamId}`);
      
      container.innerHTML = `
        <div class="mb-6">
          <div class="flex justify-between items-center">
            <div>
              <h4 class="text-lg font-semibold text-gray-800">${team.name}</h4>
              <p class="text-sm text-gray-600">팀원: ${team.members.join(', ')} (${team.memberCount}명)</p>
            </div>
            <div class="flex space-x-2">
              <button onclick="sendTeamReminder(${team.id})" class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600">
                리마인더
              </button>
              <button onclick="viewTeamDetails(${team.id})" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">
                상세보기
              </button>
            </div>
          </div>
        </div>
        
        <!-- 과제별 제출 현황 -->
        <div class="space-y-6">
          ${TEAMS_DATA.tasks.map(task => {
            const taskSubmissions = teamSubmissions[team.id][task.id];
            let completionRate = 0;
            let totalItems = 0;
            let completedItems = 0;
            
            if (task.type === 'log') {
              totalItems = task.sessions.length;
              completedItems = task.sessions.filter((_, index) => taskSubmissions[index]?.submitted).length;
            } else {
              totalItems = task.files.length;
              completedItems = task.files.filter((_, index) => taskSubmissions[index]?.submitted).length;
            }
            
            completionRate = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;
            
            return `
              <div class="border border-gray-200 rounded-lg p-4">
                <div class="flex justify-between items-center mb-4">
                  <div>
                    <h5 class="font-semibold text-gray-800">${task.title}</h5>
                    <p class="text-sm text-gray-600">마감: ${formatDate(task.dueDate)} | ${calculateDday(task.dueDate)}</p>
                  </div>
                  <div class="text-right">
                    <div class="text-lg font-medium ${completionRate === 100 ? 'text-green-600' : completionRate >= 50 ? 'text-yellow-600' : 'text-red-600'}">
                      ${completionRate}% 완료
                    </div>
                    <div class="text-sm text-gray-500">${completedItems}/${totalItems} 항목</div>
                  </div>
                </div>
                
                <!-- 진행률 바 -->
                <div class="w-full bg-gray-200 rounded-full h-3 mb-4">
                  <div class="h-3 rounded-full ${completionRate === 100 ? 'bg-green-600' : completionRate >= 50 ? 'bg-yellow-600' : 'bg-red-600'}" style="width: ${completionRate}%"></div>
                </div>
                
                <!-- 세부 항목 -->
                <div class="space-y-3">
                  ${task.type === 'log' ? 
                    task.sessions.map((session, sessionIndex) => {
                      const submission = taskSubmissions[sessionIndex];
                      const accordionId = `accordion-${team.id}-${task.id}-${sessionIndex}`;
                      return `
                        <div class="bg-gray-50 rounded border">
                          <div class="p-3">
                          <div class="flex justify-between items-start mb-2">
                              <div class="flex items-center space-x-2">
                                <button onclick="toggleAccordion('${accordionId}')" class="text-gray-600 hover:text-gray-800 transition-transform duration-200" id="btn-${accordionId}">
                                  <svg class="w-4 h-4 transform" id="icon-${accordionId}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                  </svg>
                                </button>
                            <div>
                              <span class="font-medium">${sessionIndex + 1}회차 멘토링</span>
                              <span class="text-sm text-gray-600 ml-2">(${formatDate(session.date)})</span>
                                </div>
                            </div>
                            <span class="px-2 py-1 rounded text-xs font-medium ${submission?.submitted ? 'bg-green-100 text-green-800' : session.status === 'pending' ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800'}">
                              ${submission?.submitted ? '✅ 제출완료' : session.status === 'pending' ? '❌ 미제출' : '⏳ 예정'}
                            </span>
                          </div>
                          </div>
                          
                          <!-- 아코디언 콘텐츠 -->
                          <div id="${accordionId}" class="hidden">
                            <div class="px-3 pb-3 border-t border-gray-200">
                          ${submission?.submitted && submission.attachments.length > 0 ? `
                                <div class="mt-3">
                                  <div class="flex justify-between items-center mb-3">
                                    <p class="text-sm font-medium text-gray-700">제출 파일 (${submission.attachments.length}개)</p>
                                    <div class="flex space-x-2">
                                      <button onclick="togglePreviewMode('preview-${team.id}-${task.id}-${sessionIndex}')" 
                                              class="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded hover:bg-gray-200 transition-colors">
                                        📋 목록보기
                                      </button>
                                      <button onclick="togglePreviewMode('gallery-${team.id}-${task.id}-${sessionIndex}')" 
                                              class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 transition-colors">
                                        🖼️ 미리보기
                                      </button>
                                    </div>
                                  </div>
                                  
                                  <!-- 목록 보기 -->
                                  <div id="preview-${team.id}-${task.id}-${sessionIndex}" class="space-y-2">
                                    ${submission.attachments.map((file, fileIndex) => {
                                      const isImage = file.name.match(/\.(jpg|jpeg|png)$/i);
                                      const isDocument = file.name.match(/\.(pdf|doc|docx)$/i);
                                      return `
                                        <div class="flex justify-between items-center bg-white rounded-lg px-3 py-2 border border-gray-200 hover:border-blue-300 transition-colors">
                                          <div class="flex items-center space-x-3">
                                            <div class="w-10 h-10 ${isImage ? 'bg-green-100' : 'bg-blue-100'} rounded flex items-center justify-center">
                                              ${isImage ? `
                                                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                                </svg>
                                              ` : `
                                                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                                </svg>
                                              `}
                                            </div>
                                            <div>
                                              <p class="text-sm font-medium text-gray-900">${file.name}</p>
                                              <p class="text-xs text-gray-500">
                                                업로드: ${file.uploadDate} • ${file.size} • 
                                                ${isImage ? '📷 멘토링 사진' : '📄 멘토링일지'}
                                              </p>
                                            </div>
                                          </div>
                                          <div class="flex items-center space-x-2">
                                            ${isImage ? `
                                              <button onclick="previewImage('${file.name}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs hover:bg-green-700 transition-colors">
                                                미리보기
                                              </button>
                                            ` : ''}
                                            <button onclick="downloadFile('${file.name}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs hover:bg-blue-700 transition-colors">
                                              다운로드
                                            </button>
                                          </div>
                                        </div>
                                      `;
                                    }).join('')}
                                  </div>
                                  
                                  <!-- 갤러리 미리보기 -->
                                  <div id="gallery-${team.id}-${task.id}-${sessionIndex}" class="hidden">
                                    <div class="grid grid-cols-2 gap-3">
                                      ${submission.attachments.filter(file => file.name.match(/\.(jpg|jpeg|png)$/i)).map((file, fileIndex) => `

    // 유틸리티 함수들
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('ko-KR', { 
        month: 'long', 
        day: 'numeric'
      });
    }

    function calculateDday(dueDate) {
      const today = new Date();
      const due = new Date(dueDate);
      const diffTime = due - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      if (diffDays === 0) return '오늘 마감';
      if (diffDays === 1) return '내일 마감';
      if (diffDays > 0) return `D-${diffDays}`;
      return '마감 지남';
    }

    // 아코디언 토글 함수
    function toggleAccordion(accordionId) {
      const content = document.getElementById(accordionId);
      const icon = document.getElementById(`icon-${accordionId}`);
      
      if (content.classList.contains('hidden')) {
        // 아코디언 열기

    // 드래그앤드롭 관련 함수들
    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add('border-orange-400', 'bg-orange-50');
    }

    function handleDragLeave(event) {
      event.preventDefault();
      event.currentTarget.classList.remove('border-orange-400', 'bg-orange-50');
    }

    function handleDrop(event, teamId, taskId, sessionIndex) {
      event.preventDefault();
      event.currentTarget.classList.remove('border-orange-400', 'bg-orange-50');
      
      const files = Array.from(event.dataTransfer.files);
      processFiles(files, teamId, taskId, sessionIndex);
    }

    function triggerFileInput(teamId, taskId, sessionIndex) {
      const input = document.getElementById(`fileInput-${teamId}-${taskId}-${sessionIndex}`);
      input.click();
    }

    function handleFileSelect(event, teamId, taskId, sessionIndex) {
      const files = Array.from(event.target.files);
      processFiles(files, teamId, taskId, sessionIndex);
    }

    function processFiles(files, teamId, taskId, sessionIndex) {
      const team = TEAMS_DATA.teams.find(t => t.id === teamId);
      const task = TEAMS_DATA.tasks.find(t => t.id === taskId);
      
      // 파일 검증
      const validationResult = validateMentoringFiles(files);
      
      if (!validationResult.isValid) {
        showNotification(validationResult.message, 'error');
        return;
      }

      // 파일 업로드 처리
      const dropzone = document.getElementById(`dropzone-${teamId}-${taskId}-${sessionIndex}`);
      
      // 업로드 진행 상태 표시
      dropzone.innerHTML = `
        <div class="text-center">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-600 mx-auto"></div>
          <p class="mt-2 text-sm text-gray-600">파일 업로드 중...</p>
          <p class="text-xs text-gray-500">${files.length}개 파일 처리 중</p>
        </div>
      `;

      // 시뮬레이션된 업로드 (실제로는 서버 업로드)
      setTimeout(() => {
        showNotification(`${files.length}개 파일이 성공적으로 업로드되었습니다!`, 'success');
        
        // 페이지 새로고침으로 업데이트된 데이터 표시
        setTimeout(() => {
          renderTeamContent(teamId);
        }, 1000);
      }, 2000);
    }

    function validateMentoringFiles(files) {
      if (files.length === 0) {
        return { isValid: false, message: '파일을 선택해주세요.' };
      }

      if (files.length < 1 || files.length > 5) {
        return { 
          isValid: false, 
          message: `파일 개수가 맞지 않습니다. 멘토링일지 1개 + 멘토링 사진 최대 4장까지 업로드 가능합니다. (현재: ${files.length}개)` 
        };
      }

      const documentFiles = files.filter(file => file.name.match(/\.(pdf|doc|docx)$/i));
      const imageFiles = files.filter(file => file.name.match(/\.(jpg|jpeg|png)$/i));

      if (documentFiles.length !== 1) {
        return { 
          isValid: false, 
          message: `멘토링일지 파일이 ${documentFiles.length}개입니다. 정확히 1개의 문서 파일(PDF, DOC, DOCX)이 필요합니다.` 
        };
      }

      if (imageFiles.length >= 5) {
        return { 
          isValid: false, 
          message: `멘토링 사진이 ${imageFiles.length}개입니다. 최대 4개의 이미지 파일(JPG, JPEG, PNG)까지 업로드 가능합니다.` 
        };
      }

      // 파일 크기 검증 (각 파일 최대 10MB)
      const oversizedFiles = files.filter(file => file.size > 10 * 1024 * 1024);
      if (oversizedFiles.length > 0) {
        return { 
          isValid: false, 
          message: `파일 크기가 너무 큽니다. 각 파일은 10MB 이하여야 합니다. (초과 파일: ${oversizedFiles.map(f => f.name).join(', ')})` 
        };
      }

      return { isValid: true, message: '파일 검증 완료' };
    }
