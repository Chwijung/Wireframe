  <script>
    // 사용자 인증 및 역할 확인
    function getCurrentUser() {
      const user = JSON.parse(localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser') || '{}');
      return user;
    }

    function getCurrentUserRole() {
      const user = getCurrentUser();
      return user.type || 'guest';
    }

    function checkAuthentication() {
      const user = getCurrentUser();
      if (!user.type) {
        alert('로그인이 필요합니다.');
        window.location.href = 'login.html';
        return false;
      }
      return true;
    }

    function filterUIByRole(userRole) {
      // 모든 카드 요소 가져오기
      const cards = document.querySelectorAll('[data-role]');
      
      cards.forEach(card => {
        const allowedRoles = card.getAttribute('data-role').split(',');
        if (allowedRoles.includes(userRole)) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });

      // 역할별 UI 텍스트 수정
      const subtitle = document.getElementById('cohortSubtitle');
      if (userRole === 'student') {
        subtitle.textContent = '학생';
        // 학생용 "전체 과정 목록으로" 링크 숨기기
        document.getElementById('backToMainLink').style.display = 'none';
      } else {
        subtitle.textContent = `${user.name} 님`;
      }
    }

    function displayUserInfo() {
      const user = getCurrentUser();
      const roleDisplay = document.getElementById('userRoleDisplay');
      const nameDisplay = document.getElementById('userNameDisplay');
      
      if (user.type) {
        const roleNames = {
          'operator': '운영자',
          'coach': '코치',
          'mentor': '멘토',
          'student': '학생'
        };
        
        roleDisplay.textContent = `[${roleNames[user.type] || user.type}]`;
        nameDisplay.textContent = user.name || user.email;
      }
    }

    function logout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        localStorage.removeItem('currentUser');
        sessionStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      }
    }

    // URL 파라미터로 과정 정보 동적 로드
    function loadCohortInfo() {
      const urlParams = new URLSearchParams(window.location.search);
      const cohortId = urlParams.get('cohort') || 'ai-x-3rd';
      
      // 현재 과정 정보를 localStorage에 저장
      localStorage.setItem('currentCohort', cohortId);
      
      const cohortData = {
        'ai-x-3rd': {
          name: 'AI-X 3기',
          number: '3기',
          students: '24명',
          status: '진행중'
        },
        'ai-x-2nd': {
          name: 'AI-X 2기',
          number: '2기',
          students: '18명',
          status: '완료'
        },
        'ai-x-1st': {
          name: 'AI-X 1기',
          number: '1기',
          students: '15명',
          status: '완료'
        }
      };

      const cohort = cohortData[cohortId];
      if (cohort) {
        document.getElementById('headerTitle').textContent = `${cohort.name}`;
        document.getElementById('cohortMainTitle').textContent = `${cohort.name} `;
        document.getElementById('cohortSubtitle').textContent = `${user.name} 님`;
        document.getElementById('cohortNumber').textContent = cohort.number;
        document.getElementById('cohortCardTitle').textContent = `${cohort.number} `;
        document.getElementById('studentCount').textContent = cohort.students;
        const chartTitle = document.getElementById('chartTitle');
        if (chartTitle) {
          chartTitle.textContent = `${cohort.name} 진행 현황`;
        }
        document.title = `${cohort.name}`;
        
        // 과정 운영 관리 카드 클릭 이벤트 설정
        const cohortCard = document.getElementById('cohortManagementCard');
        if (cohortCard) {
          cohortCard.onclick = function() {
            window.location.href = `cohort-detail.html?cohort=${cohortId}`;
          };
        }
      }
    }

    // 차트 초기화 및 페이지 초기화
    document.addEventListener('DOMContentLoaded', function() {
      // 인증 체크
      if (!checkAuthentication()) {
        return;
      }

      // 사용자 정보 표시
      displayUserInfo();
      
      // 역할별 UI 필터링
      const userRole = getCurrentUserRole();
      filterUIByRole(userRole);
      
      // 과정 정보 로드
      loadCohortInfo();
      
      const ctx = document.getElementById('progressChart');
      if (ctx) {
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['채점 완료', '채점 대기', '출제 예정'],
            datasets: [{
              data: [35, 45, 20],
              backgroundColor: ['#10B981', '#F59E0B', '#EF4444'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom'
              }
            }
          }
        });
      }
    });

    // 긴급 알림 버튼 클릭
    const alertBtn = document.getElementById('alertBtn');
    if (alertBtn) {
      alertBtn.addEventListener('click', function() {
        alert('운영진 긴급 알림이 3개 있습니다!\n\n1. 김하늘 학습자 멘토링 일지 3일 미작성 (긴급)\n2. 7개 과제 채점 대기중 (주의)\n3. 이지윤 학습자 출석률 저조 80% - 상담 필요 (주의)');
      });
    }
  </script>
</body>
</html>
