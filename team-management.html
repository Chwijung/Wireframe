    // 팀 편집 카드를 동적으로 생성하는 함수
    function generateTeamEditCards() {
      const container = document.getElementById('teamCardsContainer');
      if (!container) return;

      container.innerHTML = '';

      teamsData.forEach(team => {
        const cardHTML = `
          <div class="border border-${team.color}-200 rounded-lg p-4 bg-${team.color}-50">
            <div class="flex justify-between items-center mb-4">
              <h4 class="text-lg font-bold text-${team.color}-800">${team.id}조</h4>
              <button onclick="saveTeamInfo(${team.id})" class="bg-${team.color}-600 text-white px-3 py-1 rounded text-sm hover:bg-${team.color}-700">저장</button>
                </div>
            
            <div class="space-y-3">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">팀명</label>
                <input type="text" id="team${team.id}-name" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.name}">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">프로젝트명</label>
                <input type="text" id="team${team.id}-project" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.project}">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">프로젝트 설명</label>
                <textarea id="team${team.id}-description" rows="3" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">${team.description}</textarea>
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">활용기술 (쉼표로 구분)</label>
                <input type="text" id="team${team.id}-tech" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.tech}">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">담당 멘토</label>
                <input type="text" id="team${team.id}-mentor" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.mentor}">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">팀장 👑</label>
                <input type="text" id="team${team.id}-leader" class="w-full border border-gray-300 rounded px-2 py-1 text-sm bg-yellow-50 border-yellow-300" value="${team.leader}" placeholder="팀장 이름을 입력하세요">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">팀원 (쉼표로 구분)</label>
                <textarea id="team${team.id}-members" rows="2" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" placeholder="팀원 이름들을 쉼표로 구분하여 입력하세요">${team.members}</textarea>
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">카카오톡 링크</label>
                <input type="url" id="team${team.id}-kakao" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.kakao}">
                </div>
              
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">노션 링크</label>
                <input type="url" id="team${team.id}-notion" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" value="${team.notion}">
                </div>
                </div>
                </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', function() {
      generateTeamEditCards();
      viewByTeams();
    });

    // 뷰 변경 함수들
    function viewByTeams() {
      document.getElementById('teamView').classList.remove('hidden');
      document.getElementById('listView').classList.add('hidden');
      document.getElementById('teamViewBtn').classList.remove('bg-gray-600');
      document.getElementById('teamViewBtn').classList.add('bg-blue-600');
      document.getElementById('listViewBtn').classList.remove('bg-blue-600');
      document.getElementById('listViewBtn').classList.add('bg-gray-600');
    }

    function viewByList() {
      document.getElementById('teamView').classList.add('hidden');
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('listViewBtn').classList.remove('bg-gray-600');
      document.getElementById('listViewBtn').classList.add('bg-blue-600');
      document.getElementById('teamViewBtn').classList.remove('bg-blue-600');
      document.getElementById('teamViewBtn').classList.add('bg-gray-600');
      updateStudentListView();
    }

    // 팀 정보 저장 함수
    function saveTeamInfo(teamNumber) {
      const teamName = document.getElementById(`team${teamNumber}-name`).value;
      const projectName = document.getElementById(`team${teamNumber}-project`).value;
      const description = document.getElementById(`team${teamNumber}-description`)?.value || '';
      const tech = document.getElementById(`team${teamNumber}-tech`)?.value || '';
      const mentor = document.getElementById(`team${teamNumber}-mentor`).value;
      const leader = document.getElementById(`team${teamNumber}-leader`).value;
      const members = document.getElementById(`team${teamNumber}-members`).value;
      const kakaoLink = document.getElementById(`team${teamNumber}-kakao`).value;
      const notionLink = document.getElementById(`team${teamNumber}-notion`).value;
      const zoomId = document.getElementById(`team${teamNumber}-zoom`).value;
      const zoomPassword = document.getElementById(`team${teamNumber}-zoom-password`)?.value || '';
      
      alert(`${teamNumber}조 정보가 저장되었습니다!\n\n팀명: ${teamName}\n프로젝트: ${projectName}\n설명: ${description}\n기술: ${tech}\n멘토: ${mentor}\n팀장: ${leader}\n팀원: ${members}\n카카오톡: ${kakaoLink}\n노션: ${notionLink}\nZOOM ID: ${zoomId}\nZOOM 비밀번호: ${zoomPassword}`);
      
      // 실제 구현에서는 서버에 저장
      console.log(`Team ${teamNumber} info saved:`, {
        teamName, projectName, description, tech, mentor, leader, members, kakaoLink, notionLink, zoomId, zoomPassword
      });
    }

    // 수강생 목록 업데이트 함수
    function updateStudentListView() {
      const tbody = document.getElementById('studentTableBody');
      tbody.innerHTML = '';
      
      // 실제 구현에서는 서버에서 데이터를 가져옴
      const students = [];
      teamsData.forEach(team => {
        // 팀장 추가
        students.push({
          name: team.leader,
          team: team.id,
          role: 'leader',
          teamName: team.name,
          project: team.project,
          mentor: team.mentor
        });
        
        // 팀원들 추가
        const memberList = team.members.split(',').map(name => name.trim());
        memberList.forEach(memberName => {
          students.push({
            name: memberName,
            team: team.id,
            role: 'member',
            teamName: team.name,
            project: team.project,
            mentor: team.mentor
          });
        });
      });
      
      students.forEach(student => {
        const row = createStudentRow(student);
        tbody.appendChild(row);
      });
    }

    function createStudentRow(student) {
      const row = document.createElement('tr');
      const teamColors = { 1: 'blue', 2: 'green', 3: 'purple', 4: 'red', 5: 'yellow' };
      const color = teamColors[student.team];
      
      row.innerHTML = `
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center">
            <div class="w-8 h-8 bg-${color}-500 rounded-full flex items-center justify-center text-white text-sm font-medium">
              ${student.name.charAt(0)}
                </div>
            <div class="ml-3 font-medium text-gray-900">${student.name}</div>
                </div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
          <span class="px-2 py-1 text-xs font-semibold rounded-full bg-${color}-100 text-${color}-800">${student.team}조</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
          <span class="px-2 py-1 text-xs font-semibold rounded-full ${student.role === 'leader' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800'}">
            ${student.role === 'leader' ? '👑 팀장' : '팀원'}
          </span>
              </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">
          ${student.teamName}
              </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
          ${student.project}
              </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
          ${student.mentor}
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
          <div class="flex space-x-2">
            <button onclick="editStudent('${student.name}', ${student.team})" class="bg-blue-600 text-white px-2 py-1 rounded text-xs hover:bg-blue-700">
              편집
            </button>
            <button onclick="removeStudentFromList('${student.name}', ${student.team})" class="bg-red-600 text-white px-2 py-1 rounded text-xs hover:bg-red-700">
              삭제
            </button>
                </div>
              </td>
      `;
      return row;
    }

    // 기타 유틸리티 함수들
    function goBackToMain() {
      const currentCohort = localStorage.getItem('currentCohort') || 'ai-x-3rd';
      window.location.href = `main.html?cohort=${currentCohort}`;
    }

    function loadSurveyData() {
      alert('설문 데이터를 불러옵니다...');
    }

    function openSurveyManager() {
      alert('AI 팀 편성 시스템을 시작합니다...');
    }

    function exportStudentList() {
      alert('수강생 명단을 내보냅니다...');
    }

    function editStudent(studentName, teamNumber) {
      alert(`${studentName} 학생의 정보를 편집합니다.`);
    }

    function removeStudentFromList(studentName, teamNumber) {
      if (confirm(`${studentName} 학생을 삭제하시겠습니까?`)) {
        alert(`${studentName} 학생이 삭제되었습니다.`);
        updateStudentListView();
      }
    }

  </script>
